              <div class="col-12 col-md-4"><div class="cat-card p-4 text-center" style="border-color: var(--male-blue);" onclick="renderPackages('', 'Men')"><div class="icon-circle" style="background: rgba(0,74,153,0.1); color: var(--male-blue);"><i data-lucide="users"></i></div><h3 class="fw-bold" style="color: var(--male-blue);">${t.men}</h3></div></div>
              <div class="col-12 col-md-4"><div class="cat-card p-4 text-center" style="border-color: var(--female-pink);" onclick="renderPackages('', 'Women')"><div class="icon-circle" style="background: rgba(225,29,72,0.1); color: var(--female-pink);"><i data-lucide="user-round"></i></div><h3 class="fw-bold" style="color: var(--female-pink);">${t.women}</h3></div></div>
              <div class="col-12 col-md-4"><div class="cat-card p-4 text-center" style="border-color: var(--child-green);" onclick="renderPackages('', 'Children')"><div class="icon-circle" style="background: rgba(16,185,129,0.1); color: var(--child-green);"><i data-lucide="baby"></i></div><h3 class="fw-bold" style="color: var(--child-green);">${t.children}</h3></div></div>
            </div></div></div>`;
        lucide.createIcons();
      }

      function renderPackages(searchQuery = '', initialCategory = 'all') {
        const t = translations[currentLang];
        document.getElementById('app-content').innerHTML = `
          <div data-view="packages" class="container py-5"><div class="row"><div class="col-lg-3"><div class="sidebar mb-4">
          <div class="d-flex justify-content-between align-items-center mb-4"><h5 class="fw-bold mb-0">${t.filters}</h5><button class="btn btn-link btn-sm p-0 text-decoration-none" onclick="clearFilters()">${t.clear}</button></div>
          <div class="mb-3"><label class="form-label small fw-bold">Category</label><select class="form-select" id="f-cat" onchange="applyFilters()"><option value="all">All</option><option value="Men" ${initialCategory==='Men'?'selected':''}>${t.men}</option><option value="Women" ${initialCategory==='Women'?'selected':''}>${t.women}</option><option value="Children" ${initialCategory==='Children'?'selected':''}>${t.children}</option><option value="Weight Loss" ${initialCategory==='Weight Loss'?'selected':''}>${t.weight}</option><option value="Skin/Beauty">${t.skin}</option><option value="Chronic Disease">${t.chronic}</option><option value="Vitamins">${t.vitamins}</option></select></div>
          <div class="mb-3"><label class="form-label small fw-bold">Prep</label><select class="form-select" id="f-prep" onchange="applyFilters()"><option value="all">All</option><option value="fasting">${t.fastingReq}</option><option value="none">${t.noFasting}</option></select></div>
          <div class="mb-3"><label class="form-label small fw-bold">Tests</label><select class="form-select" id="f-tc" onchange="applyFilters()"><option value="all">All</option><option value="basic">Basic</option><option value="comp">Comprehensive</option></select></div>
          <div class="mb-3"><label class="form-label small fw-bold">Price</label><div class="d-flex gap-1"><input type="number" id="f-min" class="form-control" oninput="applyFilters()" placeholder="Min"><input type="number" id="f-max" class="form-control" oninput="applyFilters()" placeholder="Max"></div></div>
          <div class="mb-3"><label class="form-label small fw-bold">Search</label><input type="text" id="f-name" class="form-control" oninput="applyFilters()" value="${searchQuery}"></div>
          </div></div><div class="col-lg-9"><div class="row g-4" id="pkg-list"></div></div></div></div>`;
        applyFilters();
      }

      window.clearFilters = () => {
        document.getElementById('f-cat').value = 'all'; document.getElementById('f-prep').value = 'all';
        document.getElementById('f-tc').value = 'all'; document.getElementById('f-min').value = '';
        document.getElementById('f-max').value = ''; document.getElementById('f-name').value = ''; applyFilters();
      };

      function applyFilters() {
        const cat = document.getElementById('f-cat').value; const prep = document.getElementById('f-prep').value;
        const tc = document.getElementById('f-tc').value; const nameQ = document.getElementById('f-name').value.toLowerCase();
        const minP = parseInt(document.getElementById('f-min').value) || 0; const maxP = parseInt(document.getElementById('f-max').value) || 9999;
        
        const filtered = packages.filter(p => {
          let mCat = cat === 'all' || p.category === cat;
          if (cat === 'Men' && p.id === 7) mCat = true; if (cat === 'Women' && p.id === 8) mCat = true;
          const isFasting = p.precautions[currentLang].includes('صيام') || p.precautions[currentLang].toLowerCase().includes('fasting');
          const mPrep = prep === 'all' || (prep === 'fasting' ? isFasting : !isFasting);
          const mTC = tc === 'all' || (tc === 'basic' ? p.testCount < 10 : p.testCount >= 10);
          const mPrice = p.price >= minP && p.price <= maxP;
          return mCat && mPrep && mTC && mPrice && (p.name[currentLang].toLowerCase().includes(nameQ) || p.code.includes(nameQ));
        });
        
        const list = document.getElementById('pkg-list'); list.innerHTML = '';
        filtered.forEach(p => {
          const t = translations[currentLang]; const esc = p.name[currentLang].replace(/'/g, "\\'");
          list.innerHTML += `<div class="col-md-6"><div class="card card-package shadow-sm" onclick="showPackageDetails(${p.id})"><div class="barcode-wrapper" onclick="event.stopPropagation(); enlargeBarcode('${p.code}', '${esc}')"><img class="barcode-img" src="https://barcodeapi.org/api/128/${p.code}"><div class="code-text">${p.code}</div></div><div class="card-body p-4"><h5 class="fw-bold">${p.name[currentLang]}</h5><span class="price-tag">${p.price} ${t.sar}</span><button class="btn btn-gold w-100 mt-3">${t.details}</button></div></div></div>`;
        });
        lucide.createIcons();
      }

      window.enlargeBarcode = (code, name) => {
        Swal.fire({ title: name, html: `<div style="background:white; padding:40px 10px;"><p class="fw-bold text-primary mb-4">Scanner Ready</p><img style="width:100%; max-width:400px;" src="https://barcodeapi.org/api/128/${code}"><div style="font-family:'JetBrains Mono', monospace; font-size:2.5rem; letter-spacing:10px; margin-top:20px; color:black;">${code}</div></div>`, showConfirmButton: false, showCloseButton: true, width: '600px' });
      };

      window.showPackageDetails = (id) => {
        const p = packages.find(pkg => pkg.id === id); const t = translations[currentLang]; const esc = p.name[currentLang].replace(/'/g, "\\'");
        Swal.fire({
          title: p.name[currentLang],
          html: `<div class="text-start ${currentLang==='ar'?'text-end':''}">
            <div class="text-center mb-4"><div class="barcode-wrapper p-3 d-inline-block border rounded" onclick="enlargeBarcode('${p.code}', '${esc}')"><img style="height:60px" src="https://barcodeapi.org/api/128/${p.code}"><div class="code-text fw-bold" style="font-size:1.1rem; color:var(--primary-blue)">${p.code}</div></div></div>
            <p><strong>${t.target}:</strong> ${p.targetGroup[currentLang]}</p>
            <p class="text-danger"><strong>Precautions:</strong> ${p.precautions[currentLang]}</p>
            <div class="d-flex flex-wrap">${p.tests.map(test => `<span class="test-badge" onclick="showTestInfo('${test.replace(/'/g, "\\'")}', ${p.id})">${test}</span>`).join('')}</div>
          </div>`, width: '700px', confirmButtonColor: '#004a99', showCloseButton: true
        });
      };

      window.showTestInfo = (name, pId) => {
        const n = name.toLowerCase();
        const item = glossary.find(g => n.includes(g.name.toLowerCase()) || g.name.toLowerCase().includes(n));
        Swal.fire({ title: item ? item.name : name, text: item ? item.description[currentLang] : "Diagnostic laboratory measurement.", icon: 'info', confirmButtonText: translations[currentLang].back, confirmButtonColor: '#004a99' }).then(() => showPackageDetails(pId));
      };

      function renderGlossary() { const t = translations[currentLang]; document.getElementById('app-content').innerHTML = `<div data-view="glossary" class="container py-5"><h1 class="text-center fw-bold mb-5">${t.glossaryTitle}</h1><div class="row g-4">${glossary.map(g => `<div class="col-md-6"><div class="card h-100 p-4 border-0 shadow-sm"><h5>${g.name}</h5><p class="text-muted">${g.description[currentLang]}</p></div></div>`).join('')}</div></div>`; }
      
      function renderPreparation() { 
        const t = translations[currentLang]; 
        const noFastIds = [10, 11, 18, 19, 20];
        const fasting = packages.filter(p => !noFastIds.includes(p.id) && (p.precautions[currentLang].includes('صيام') || p.precautions[currentLang].toLowerCase().includes('fasting')));
        const nonFasting = packages.filter(p => noFastIds.includes(p.id) || (!p.precautions[currentLang].includes('صيام') && !p.precautions[currentLang].toLowerCase().includes('fasting')));
        document.getElementById('app-content').innerHTML = `<div data-view="prep" class="container py-5"><h1 class="text-center fw-bold mb-5">${t.prepTitle}</h1><div class="row g-4"><div class="col-md-6"><div class="card border-0 shadow-sm h-100"><div class="bg-primary text-white p-3"><h5>${t.fastingReq}</h5></div><div class="p-4">${fasting.map(p => `<p class="mb-1 fw-bold">${p.name[currentLang]}</p><p class="small text-danger mb-3">${p.precautions[currentLang]}</p>`).join('')}</div></div></div><div class="col-md-6"><div class="card border-0 shadow-sm h-100"><div class="bg-success text-white p-3"><h5>${t.noFasting}</h5></div><div class="p-4">${nonFasting.map(p => `<p class="mb-1 fw-bold">${p.name[currentLang]}</p><p class="small text-muted mb-3">${p.precautions[currentLang]}</p>`).join('')}</div></div></div></div></div>`;
      }

      document.addEventListener('DOMContentLoaded', init);
    </script>
  </body>
</html>
