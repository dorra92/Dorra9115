        // Enhanced glossary with detailed info
        function getEnhancedGlossaryData() {
            const testsMap = {};
            const allTests = [...new Set(packages.flatMap(p => p.tests))];
            
            allTests.forEach(test => {
                testsMap[test] = {
                    name: test,
                    description: getDetailedDescription(test),
                    referenceRange: getReferenceRange(test),
                    clinicalSignificance: getClinicalSignificance(test),
                    preparation: getPreparationNotes(test),
                    category: getTestCategory(test)
                };
            });
            return Object.values(testsMap);
        }
        
        function getDetailedDescription(test) {
            const desc = {
                "CBC": "Complete Blood Count measures red blood cells (carry oxygen), white blood cells (fight infection), platelets (clotting), hemoglobin, and hematocrit. Essential for detecting anemia, infection, leukemia, and clotting disorders.",
                "HDL": "High-Density Lipoprotein - 'Good Cholesterol'. Helps remove excess cholesterol from arteries and transport it to the liver for elimination. Higher levels protect against heart disease.",
                "LDL": "Low-Density Lipoprotein - 'Bad Cholesterol'. Carries cholesterol to arteries where it can form plaque. Elevated levels increase risk of atherosclerosis, heart attack, and stroke.",
                "Cholesterol": "Total cholesterol measurement including HDL, LDL, and VLDL. Key indicator of cardiovascular health and lipid metabolism.",
                "Triglycerides": "Main form of fat stored in the body. High levels linked to metabolic syndrome, diabetes, pancreatitis, and heart disease.",
                "FBS": "Fasting Blood Sugar measures glucose after 8-12 hours fasting. Primary screening test for diabetes and prediabetes.",
                "HbA1C": "Glycated Hemoglobin reflects average blood glucose over 2-3 months. Gold standard for diabetes management and diagnosis.",
                "TSH": "Thyroid Stimulating Hormone controls thyroid function. High indicates hypothyroidism, low indicates hyperthyroidism.",
                "Vitamin D": "Essential for calcium absorption, bone health, immune function, and mood regulation. Deficiency linked to osteoporosis, depression, and autoimmune diseases.",
                "Ferritin": "Iron storage protein. Low levels indicate iron deficiency anemia. High levels may suggest inflammation, liver disease, or iron overload.",
                "Zinc": "Essential mineral for immune function, wound healing, DNA synthesis, and hair growth. Deficiency causes hair loss and poor immunity.",
                "Magnesium": "Critical for muscle/nerve function, blood pressure regulation, protein synthesis, and energy production.",
                "AST": "Aspartate Aminotransferase - liver enzyme elevated in liver damage, hepatitis, or muscle injury.",
                "ALT": "Alanine Aminotransferase - more specific liver enzyme marker for hepatocellular injury.",
                "Urea": "Blood Urea Nitrogen - waste product from protein breakdown. Elevated in kidney dysfunction or dehydration.",
                "Creatinine": "Waste product from muscle metabolism. Primary marker for kidney filtration function.",
                "Testosterone": "Primary male sex hormone regulating libido, muscle mass, bone density, and red blood cell production.",
                "Prolactin": "Pituitary hormone that stimulates milk production. Elevated levels can cause infertility and menstrual irregularities.",
                "PSA": "Prostate Specific Antigen - screening marker for prostate health and prostate cancer risk.",
                "LH": "Luteinizing Hormone - regulates reproduction, triggers ovulation in women and testosterone production in men.",
                "FSH": "Follicle Stimulating Hormone - controls egg/sperm production and reproductive function.",
                "HOMA-IR": "Homeostatic Model Assessment of Insulin Resistance - calculated index measuring insulin resistance and prediabetes risk.",
                "Calprotectin": "Fecal marker for intestinal inflammation. Elevated in Crohn's disease and ulcerative colitis.",
                "CRP": "C-Reactive Protein - acute phase reactant indicating systemic inflammation or infection.",
                "Amylase": "Digestive enzyme from pancreas. Elevated in pancreatitis or salivary gland disorders.",
                "Lipase": "More specific pancreatic enzyme marker for acute pancreatitis.",
                "eGFR": "Estimated Glomerular Filtration Rate - calculated kidney function score. Below 60 indicates kidney disease.",
                "GGT": "Gamma-Glutamyl Transferase - liver enzyme elevated in alcohol use, bile duct obstruction, or liver disease.",
                "ALP": "Alkaline Phosphatase - elevated in liver disease, bone disorders, or bile duct blockage.",
                "CK": "Creatine Kinase - muscle enzyme elevated in heart attack, muscle injury, or intense exercise.",
                "Vit B12": "Essential for nerve function, DNA synthesis, and red blood cell formation. Deficiency causes fatigue and neurological issues.",
                "Calcium": "Critical for bone health, muscle contraction, nerve transmission, and blood clotting.",
                "Phosphorus": "Works with calcium for bone health and energy metabolism.",

            };
            return desc[test] || `${test} - Comprehensive laboratory assessment for metabolic and organ function evaluation. Consult with healthcare provider for interpretation.`;

        window.showEnlargedBarcode = function(code,name){ document.getElementById('barcode-content').innerHTML = `<button onclick="closeBarcodeModal()" class="absolute top-3 right-3 btn-ghost"><i data-lucide="x" class="w-5 h-5"></i></button><h3 class="text-xl font-bold">${name}</h3><img src="https://barcodeapi.org/api/128/${code}" class="w-full max-w-xs mx-auto my-4"><span class="text-2xl font-mono tracking-widest font-bold text-primary">${code}</span><p class="text-muted-foreground text-sm mt-3">${t().scanAtLab}</p>`; document.getElementById('barcode-modal').classList.add('active'); lucide.createIcons(); };
        window.closeBarcodeModal = function(e){ if(!e||e.target===e.currentTarget) document.getElementById('barcode-modal').classList.remove('active'); };
        function renderPreparation(){ const noFastIds = [10,11,18,19,20]; const fasting = packages.filter(p=>!noFastIds.includes(p.id)&&(p.precautions[currentLang].includes('صيام')||p.precautions[currentLang].toLowerCase().includes('fasting'))); const non = packages.filter(p=>noFastIds.includes(p.id)||(!p.precautions[currentLang].includes('صيام')&&!p.precautions[currentLang].toLowerCase().includes('fasting'))); document.getElementById('app-content').innerHTML = `<div class="max-w-5xl mx-auto px-5 py-12"><div class="text-center"><i data-lucide="clipboard-list" class="w-12 h-12 text-primary mx-auto mb-4"></i><h1 class="text-3xl font-bold">${t().preparation}</h1></div><div class="flex justify-center gap-2 mt-6 mb-8"><button onclick="switchTab('fasting')" id="fasting-tab" class="tab-btn active-fasting">${t().fastingRequired}</button><button onclick="switchTab('nonfasting')" id="nonfasting-tab" class="tab-btn">${t().noFasting}</button></div><div id="fasting-panel" class="tab-content active space-y-3">${fasting.map(p=>`<div class="bg-white rounded-xl p-4 border-l-4 border-amber-400 shadow-sm"><h3 class="font-semibold">${p.name[currentLang]}</h3><p class="text-amber-700 text-sm">⚠️ ${p.precautions[currentLang]}</p></div>`).join('')}</div><div id="nonfasting-panel" class="tab-content space-y-3">${non.map(p=>`<div class="bg-white rounded-xl p-4 border-l-4 border-green-400"><h3 class="font-semibold">${p.name[currentLang]}</h3><p class="text-green-700 text-sm">✔️ ${p.precautions[currentLang]}</p></div>`).join('')}</div></div>`; lucide.createIcons(); }
        window.switchTab = function(tab){ document.getElementById('fasting-tab').className = tab==='fasting'?'tab-btn active-fasting':'tab-btn'; document.getElementById('nonfasting-tab').className = tab==='nonfasting'?'tab-btn active-nonfasting':'tab-btn'; document.getElementById('fasting-panel').className = tab==='fasting'?'tab-content active space-y-3':'tab-content space-y-3'; document.getElementById('nonfasting-panel').className = tab==='nonfasting'?'tab-content active space-y-3':'tab-content space-y-3'; };
        
        document.addEventListener('DOMContentLoaded', ()=>{ renderNav(); showView('home'); lucide.createIcons(); });
    </script>
</body>
</html>
