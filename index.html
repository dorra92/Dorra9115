                    <div class="form-check"><input class="form-check-input" type="radio" name="f-tc" value="all" id="tca" checked onchange="applyFilters()"><label class="form-check-label" for="tca">${t.all}</label></div>
                    <div class="form-check"><input class="form-check-input" type="radio" name="f-tc" value="basic" id="tcb" onchange="applyFilters()"><label class="form-check-label" for="tcb">${t.basic}</label></div>
                    <div class="form-check"><input class="form-check-input" type="radio" name="f-tc" value="comprehensive" id="tcc" onchange="applyFilters()"><label class="form-check-label" for="tcc">${t.comprehensive}</label></div>
                  </div>
                  <div class="mb-3"><label class="form-label small fw-bold">Search Included Test</label><input type="text" id="f-test" class="form-control" placeholder="e.g. Ferritin" oninput="applyFilters()"></div>
                </div>
              </div>
              <div class="col-lg-9">
                <input type="text" id="f-name" class="form-control form-control-lg mb-4 shadow-sm" placeholder="${t.searchPlaceholder}" value="${searchQuery}" oninput="applyFilters()">
                <div class="row g-4" id="pkg-list"></div>
                <div id="no-res" class="text-center py-5 d-none"><p class="lead text-muted">${t.noResults}</p></div>
              </div>
            </div>
          </div>
        `;
        lucide.createIcons();
        applyFilters();
      }

      function clearFilters() {
        document.getElementById('f-cat').value = 'all';
        document.getElementById('f-min').value = 0;
        document.getElementById('f-max').value = 1000;
        document.getElementById('tca').checked = true;
        document.getElementById('f-test').value = '';
        document.getElementById('f-name').value = '';
        applyFilters();
      }

      function applyFilters() {
        const cat = document.getElementById('f-cat').value;
        const min = parseInt(document.getElementById('f-min').value) || 0;
        const max = parseInt(document.getElementById('f-max').value) || 1000;
        const tc = document.querySelector('input[name="f-tc"]:checked').value;
        const testQ = document.getElementById('f-test').value.toLowerCase();
        const nameQ = document.getElementById('f-name').value.toLowerCase();

        const filtered = packages.filter(p => {
          const mCat = cat === 'all' || p.category === cat;
          const mPrice = p.price >= min && p.price <= max;
          const mTC = tc === 'all' || (tc === 'basic' && p.testCount <= 10) || (tc === 'comprehensive' && p.testCount > 10);
          const mTest = testQ === '' || p.tests.some(t => t.toLowerCase().includes(testQ));
          const mName = nameQ === '' || p.name[currentLang].toLowerCase().includes(nameQ);
          return mCat && mPrice && mTC && mTest && mName;
        });

        const list = document.getElementById('pkg-list');
        const empty = document.getElementById('no-res');
        list.innerHTML = '';
        empty.classList.toggle('d-none', filtered.length > 0);

        filtered.forEach(p => {
          const t = translations[currentLang];
          list.innerHTML += `
            <div class="col-md-6">
              <div class="card card-package shadow-sm p-4" onclick="showPackageDetails(${p.id})">
                <div class="d-flex justify-content-between mb-2">
                  <span class="badge bg-primary-subtle text-primary">${p.category}</span>
                  <span class="price-tag">${p.price} ${t.sar}</span>
                </div>
                <h5 class="fw-bold">${p.name[currentLang]}</h5>
                <p class="text-muted small"><i data-lucide="microscope" class="me-1"></i> ${p.testCount} ${t.tests}</p>
                <button class="btn btn-gold w-100 mt-auto">${t.details}</button>
              </div>
            </div>
          `;
        });
        lucide.createIcons();
      }

      window.showPackageDetails = (id) => {
        const p = packages.find(pkg => pkg.id === id);
        const t = translations[currentLang];
        Swal.fire({
          title: p.name[currentLang],
          html: `
            <div class="text-start ${currentLang==='ar'?'text-end':''}">
              <div class="mb-3"><h6 class="fw-bold text-primary">${t.targetGroup}</h6><p class="small text-muted">${p.targetGroup[currentLang]}</p></div>
              <div class="mb-3"><h6 class="fw-bold text-danger">${t.precautions}</h6><p class="small text-muted">${p.precautions[currentLang]}</p></div>
              <div><h6 class="fw-bold text-success">${t.testList} (${p.testCount})</h6><div class="d-flex flex-wrap">${p.tests.map(test => `<span class="test-badge" onclick="showTestInfo('${test}')">${test}</span>`).join('')}</div></div>
            </div>`,
          width: '700px', confirmButtonColor: '#004a99'
        });
      };

      window.showTestInfo = (name) => {
        const item = glossary.find(g => name.toLowerCase().includes(g.name.toLowerCase()));
        if (item) Swal.fire({ title: item.name, text: item.description[currentLang], icon: 'info' });
      };

      function renderGlossary() {
        const t = translations[currentLang];
        document.getElementById('app-content').innerHTML = `
          <div data-view="glossary" class="container py-5">
            <h1 class="text-center fw-bold mb-5">${t.glossaryTitle}</h1>
            <div class="row g-4">${glossary.map(g => `<div class="col-md-6"><div class="card h-100 p-4 border-0 shadow-sm"><h5>${g.name}</h5><p class="text-muted">${g.description[currentLang]}</p></div></div>`).join('')}</div>
          </div>`;
      }

      function renderPreparation() {
        const t = translations[currentLang];
        // Define exclusion IDs (Vitamin D: 10, Celiac: 18, Basic Diabetic: 20)
        const excludeIds = [10, 18, 20];
        const visiblePackages = packages.filter(p => !excludeIds.includes(p.id));
        
        const fasting = visiblePackages.filter(p => p.precautions[currentLang].includes('صيام') || p.precautions[currentLang].toLowerCase().includes('fasting'));
        const nonFasting = visiblePackages.filter(p => !fasting.includes(p));
        
        document.getElementById('app-content').innerHTML = `
          <div data-view="prep" class="container py-5">
            <h1 class="text-center fw-bold mb-5">${t.prepTitle}</h1>
            <div class="row g-4">
              <div class="col-md-6"><div class="card border-0 shadow-sm h-100"><div class="bg-primary text-white p-3"><h5>${t.fastingReq}</h5></div><div class="p-4">${fasting.map(p => `<p class="mb-1 fw-bold">${p.name[currentLang]}</p><p class="small text-danger mb-3">${p.precautions[currentLang]}</p>`).join('')}</div></div></div>
              <div class="col-md-6"><div class="card border-0 shadow-sm h-100"><div class="bg-success text-white p-3"><h5>${t.noFasting}</h5></div><div class="p-4">${nonFasting.map(p => `<p class="mb-1 fw-bold">${p.name[currentLang]}</p><p class="small text-muted mb-3">${p.precautions[currentLang]}</p>`).join('')}</div></div></div>
            </div>
          </div>`;
      }

      document.addEventListener('DOMContentLoaded', init);
    </script>
  </body>
</html>
