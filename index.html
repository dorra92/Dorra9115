 دقيقة", heroSubtitle:"باقات شاملة وفلترة حسب أي تحليل مثل LDL و HDL", footerText:"© 2026 باقات الصحة", madeBy:"صنع بواسطة", area:"المنطقة", testFilter:"فلترة حسب التحليل", testPlaceholder:"مثال: LDL, HDL" } };
        let currentLang = 'en', currentView = 'home';
        let filters = { category:'all', prep:'all', minPrice:'', maxPrice:'', search:'', testKeyword:'' };
        const t = () => translations[currentLang];
        const categoryConfig = { Men:{ icon:'users', class:'category-badge-men' }, Women:{ icon:'user', class:'category-badge-women' }, Children:{ icon:'baby', class:'category-badge-children' }, 'Weight Loss':{ icon:'scale', class:'category-badge-weight' }, 'Skin/Beauty':{ icon:'sparkles', class:'category-badge-skin' }, 'Chronic Disease':{ icon:'activity', class:'category-badge-chronic' }, Vitamins:{ icon:'pill', class:'category-badge-vitamins' } };
        
        function toggleLanguage(){ currentLang = currentLang==='en'?'ar':'en'; document.getElementById('html-root').dir = currentLang==='ar'?'rtl':'ltr'; renderNav(); showView(currentView); updateFooter(); lucide.createIcons(); }
        function updateFooter(){ document.getElementById('footer-logo').innerHTML = t().logo; document.getElementById('footer-text').innerHTML = t().footerText; document.getElementById('made-by-text').innerHTML = t().madeBy; document.getElementById('area-text').innerHTML = t().area; }
        function renderNav(){ const navItems = ['home','packages','glossary','preparation'].map(id=>({ id, label:t()[id] })); document.getElementById('desktop-nav').innerHTML = navItems.map(i=>`<button onclick="showView('${i.id}')" class="btn-ghost ${currentView===i.id?'active bg-primary/5 text-primary font-semibold':''}">${i.label}</button>`).join(''); document.getElementById('mobile-nav').innerHTML = `<div class="py-3 flex flex-col gap-1">${navItems.map(i=>`<button onclick="showView('${i.id}');toggleMobileMenu();" class="btn-ghost text-left w-full py-2 ${currentView===i.id?'bg-primary/5 text-primary font-semibold':''}">${i.label}</button>`).join('')}</div>`; document.getElementById('lang-text').innerHTML = t().langSwitch; document.getElementById('logo-text').innerHTML = t().logo; }
        function toggleMobileMenu(){ document.getElementById('mobile-nav').classList.toggle('open'); }
        function showView(view, category=null){ currentView = view; if(category) filters.category = category; renderNav(); if(view==='packages') renderPackages(); else if(view==='glossary') renderGlossary(); else if(view==='preparation') renderPreparation(); else renderHome(); lucide.createIcons(); window.scrollTo(0,0); }
        
        function renderHome(){
            document.getElementById('app-content').innerHTML = `
            <section class="max-w-7xl mx-auto px-5 py-12 lg:py-20">
                <div class="grid lg:grid-cols-2 gap-12 items-center">
                    <div><span class="text-secondary font-semibold text-sm tracking-wide"></span><h1 class="text-4xl lg:text-5xl font-bold mt-2 leading-tight">${t().heroTitle}</h1><p class="text-muted-foreground text-lg mt-4">${t().heroSubtitle}</p>
                    <div class="flex flex-col sm:flex-row gap-3 mt-8"><input type="text" id="hero-search" placeholder="${t().searchPlaceholder}" class="input flex-1"><button onclick="heroSearch()" class="btn-primary">${t().packages}</button></div></div>
                    <div class="relative"><img src="https://nctaindia.in/images/course/lab.jpg" class="rounded-3xl shadow-xl object-cover h-80 w-full border-4 border-white" alt="Modern medical laboratory"><div class="absolute -bottom-4 -right-4 bg-white rounded-2xl shadow-lg p-3 flex items-center gap-2"><i data-lucide="microscope" class="w-6 h-6 text-primary"></i><span class="font-bold">ISO Certified</span></div></div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-5 mt-16">${Object.entries(categoryConfig).map(([key,val])=>`<button onclick="showView('packages','${key}')" class="bg-white rounded-2xl p-5 text-center border hover:border-primary/30 transition shadow-sm"><div class="icon-bg ${val.class} w-12 h-12 mx-auto mb-3 flex items-center justify-center rounded-2xl"><i data-lucide="${val.icon}" class="w-6 h-6"></i></div><span class="font-medium">${t()[key.toLowerCase().replace(' ','')]||key}</span></button>`).join('')}</div>
                <div class="mt-20"><h2 class="text-2xl font-bold">${t().featured}</h2><div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 mt-6">${packages.slice(0,4).map(p=>renderPackageCard(p)).join('')}</div></div>
            </section>`; lucide.createIcons();
        }
        function heroSearch(){ filters.search = document.getElementById('hero-search')?.value||''; filters.testKeyword=''; showView('packages'); }
        function renderPackageCard(pkg){ const config = categoryConfig[pkg.category]||{ icon:'flask-conical',class:'category-badge-men' }; const isFasting = pkg.precautions[currentLang].includes('صيام')||pkg.precautions[currentLang].toLowerCase().includes('fasting'); return `<div class="card-hover cursor-pointer bg-white rounded-2xl border border-gray-200 overflow-hidden" onclick="showPackageDetail(${pkg.id})"><div class="barcode-container p-3 text-center border-b"><img src="https://barcodeapi.org/api/128/${pkg.code}" class="h-8 mx-auto opacity-70"><span class="text-xs font-mono tracking-widest text-muted-foreground">${pkg.code}</span></div><div class="p-5"><div class="flex gap-2 mb-3"><div class="p-1.5 rounded-xl ${config.class}"><i data-lucide="${config.icon}" class="w-4 h-4"></i></div><span class="badge badge-outline">${pkg.testCount} ${t().tests}</span><span class="badge ${isFasting?'badge-amber':'badge-green'}">${isFasting?t().fastingRequired:t().noFasting}</span></div><h3 class="font-semibold text-lg mb-2 line-clamp-2">${pkg.name[currentLang]}</h3><div class="flex justify-between items-center mt-4"><span class="text-2xl font-bold text-primary">${pkg.price} <span class="text-sm font-normal">${t().sar}</span></span><button class="btn-primary text-sm py-2 px-4">${t().viewDetails}</button></div></div></div>`; }
        
        // FIXED: renderPackages with proper sticky sidebar fix - no overlapping
        function renderPackages(){
            const cats = [{val:'all',label:t().all},{val:'Men',label:t().men},{val:'Women',label:t().women},{val:'Children',label:t().children},{val:'Weight Loss',label:t().weightLoss},{val:'Skin/Beauty',label:t().skinBeauty},{val:'Chronic Disease',label:t().chronicDisease},{val:'Vitamins',label:t().vitamins}];
            document.getElementById('app-content').innerHTML = `
            <div class="max-w-7xl mx-auto px-5 py-10 lg:py-14">
                <div class="flex flex-col lg:flex-row gap-8 items-start">
                    <!-- Sidebar with fixed sticky behavior - no overlap -->
                    <aside class="lg:w-80 flex-shrink-0 sticky-sidebar-fix">
                        <div class="bg-white p-6 rounded-2xl border shadow-sm">
                            <h3 class="font-bold text-lg flex justify-between"><span>${t().filters}</span><button onclick="clearFilters()" class="text-sm text-primary">${t().clearFilters}</button></h3>
                            <div class="mt-4 space-y-4">
                                <div><input type="text" id="filter-search" value="${filters.search}" placeholder="${t().searchPlaceholder}" class="input" oninput="updateFilter('search',this.value)"></div>
                                <div><input type="text" id="filter-test" value="${filters.testKeyword}" placeholder="${t().testPlaceholder}" class="input" oninput="updateFilter('testKeyword',this.value)"></div>
                                <div><select class="select" onchange="updateFilter('category',this.value)">${cats.map(c=>`<option value="${c.val}" ${filters.category===c.val?'selected':''}>${c.label}</option>`).join('')}</select></div>
                                <div><select class="select" onchange="updateFilter('prep',this.value)"><option value="all">${t().all}</option><option value="fasting">${t().fastingRequired}</option><option value="none">${t().noFasting}</option></select></div>
                                <div><div class="flex gap-2"><input type="number" placeholder="${t().min}" value="${filters.minPrice}" class="input w-1/2" oninput="updateFilter('minPrice',this.value)"><input type="number" placeholder="${t().max}" value="${filters.maxPrice}" class="input w-1/2" oninput="updateFilter('maxPrice',this.value)"></div></div>
                            </div>
                        </div>
                    </aside>
                    <!-- Main content with proper z-index -->
                    <main class="flex-1 min-w-0 packages-main-content">
                        <div class="mb-4 flex justify-between items-center flex-wrap"><h2 class="text-2xl font-bold">${t().packages}</h2><span id="package-count" class="text-muted-foreground"></span></div>
                        <div class="grid sm:grid-cols-2 xl:grid-cols-3 gap-6" id="packages-grid"></div>
                    </main>
                </div>
            </div>`;
            applyFilters();
        }
        function updateFilter(key,val){ filters[key]=val; applyFilters(); }
        function clearFilters(){ filters = { category:'all', prep:'all', minPrice:'', maxPrice:'', search:'', testKeyword:'' }; showView('packages'); }
        function applyFilters(){
            const filtered = packages.filter(p=>{
                const isFasting = p.precautions[currentLang].includes('صيام')||p.precautions[currentLang].toLowerCase().includes('fasting');
                const matchCat = filters.category==='all'||p.category===filters.category;
                const matchPrep = filters.prep==='all'||(filters.prep==='fasting'?isFasting:!isFasting);
                const minP = parseInt(filters.minPrice)||0, maxP = parseInt(filters.maxPrice)||9999;
                const matchPrice = p.price>=minP&&p.price<=maxP;
                const matchSearch = filters.search===''||p.name[currentLang].toLowerCase().includes(filters.search.toLowerCase())||p.code.includes(filters.search);
                const matchTest = filters.testKeyword===''||p.tests.some(t=>t.toLowerCase().includes(filters.testKeyword.toLowerCase()));
                return matchCat && matchPrep && matchPrice && matchSearch && matchTest;
            });
            const countEl = document.getElementById('package-count');
            if(countEl) countEl.innerHTML = `${filtered.length} ${t().packages}`;
            const grid = document.getElementById('packages-grid');
            if(grid){
                if(filtered.length) grid.innerHTML = filtered.map(p=>renderPackageCard(p)).join('');
                else grid.innerHTML = `<div class="col-span-full text-center py-20"><i data-lucide="flask-conical" class="w-14 h-14 mx-auto text-muted-foreground/40 mb-3"></i><p>${t().noResults}</p></div>`;
            }
            lucide.createIcons();
        }
        function showPackageDetail(id){ const pkg = packages.find(p=>p.id===id); const config = categoryConfig[pkg.category]||{icon:'flask-conical',class:'category-badge-men'}; const isFasting = pkg.precautions[currentLang].includes('صيام')||pkg.precautions[currentLang].toLowerCase().includes('fasting'); document.getElementById('modal-content').innerHTML = `<div class="flex justify-between items-center mb-4"><div class="flex gap-3"><div class="p-2 rounded-xl ${config.class}"><i data-lucide="${config.icon}" class="w-5 h-5"></i></div><h2 class="text-xl font-bold">${pkg.name[currentLang]}</h2></div><button onclick="closeModal()" class="btn-ghost"><i data-lucide="x" class="w-5 h-5"></i></button></div><div class="bg-gray-50 rounded-2xl p-5 text-center cursor-pointer mb-5" onclick="showEnlargedBarcode('${pkg.code}','${pkg.name[currentLang].replace(/'/g,"\\'")}')"><p class="text-xs text-muted-foreground">${t().clickToEnlarge}</p><img src="https://barcodeapi.org/api/128/${pkg.code}" class="h-10 mx-auto my-2"><span class="font-mono font-bold tracking-wider">${pkg.code}</span><p class="text-xs mt-1">${t().scanAtLab}</p></div><div class="grid grid-cols-2 gap-4 mb-5"><div class="p-3 bg-muted/40 rounded-xl"><div class="text-sm text-muted-foreground">${t().targetGroup}</div><div class="font-medium">${pkg.targetGroup[currentLang]}</div></div><div class="p-3 ${isFasting?'bg-amber-50':'bg-green-50'} rounded-xl"><div class="text-sm text-muted-foreground">${t().precautions}</div><div class="font-medium">${pkg.precautions[currentLang]}</div></div></div><div><h4 class="font-semibold mb-3 flex gap-2"><i data-lucide="microscope" class="w-4 h-4"></i>${t().includedTests} (${pkg.testCount})</h4><div class="flex flex-wrap gap-2">${pkg.tests.map(t=>`<span class="badge bg-gray-100">${t}</span>`).join('')}</div></div><div class="mt-6 p-4 bg-primary/5 rounded-2xl flex justify-between"><span>${t().packages}</span><span class="text-2xl font-bold text-primary">${pkg.price} ${t().sar}</span></div>`; document.getElementById('package-modal').classList.add('active'); lucide.createIcons(); }
        function closeModal(e){ if(!e||e.target===e.currentTarget) document.getElementById('package-modal').classList.remove('active'); }
        function showEnlargedBarcode(code,name){ document.getElementById('barcode-content').innerHTML = `<button onclick="closeBarcodeModal()" class="absolute top-3 right-3 btn-ghost"><i data-lucide="x" class="w-5 h-5"></i></button><h3 class="text-xl font-bold">${name}</h3><img src="https://barcodeapi.org/api/128/${code}" class="w-full max-w-xs mx-auto my-4"><span class="text-2xl font-mono tracking-widest font-bold text-primary">${code}</span><p class="text-muted-foreground text-sm mt-3">${t().scanAtLab}</p>`; document.getElementById('barcode-modal').classList.add('active'); lucide.createIcons(); }
        function closeBarcodeModal(e){ if(!e||e.target===e.currentTarget) document.getElementById('barcode-modal').classList.remove('active'); }
        function renderGlossary(){ document.getElementById('app-content').innerHTML = `<div class="max-w-4xl mx-auto px-5 py-12"><div class="text-center"><i data-lucide="book-open" class="w-12 h-12 text-primary mx-auto mb-4"></i><h1 class="text-3xl font-bold">${t().glossary}</h1><p class="text-muted-foreground">Complete list of all 50+ biomarkers</p></div><div class="mt-10 space-y-3">${glossary.map(g=>`<div class="accordion-item bg-white rounded-2xl border p-4"><button onclick="this.parentElement.classList.toggle('open')" class="w-full flex justify-between items-center"><span class="font-semibold">${g.name}</span><i data-lucide="chevron-down" class="w-5 h-5 accordion-icon"></i></button><div class="accordion-content pt-2 text-muted-foreground">${g.description[currentLang]}</div></div>`).join('')}</div></div>`; lucide.createIcons(); }
        function renderPreparation(){ const noFastIds = [10,11,18,19,20]; const fasting = packages.filter(p=>!noFastIds.includes(p.id)&&(p.precautions[currentLang].includes('صيام')||p.precautions[currentLang].toLowerCase().includes('fasting'))); const non = packages.filter(p=>noFastIds.includes(p.id)||(!p.precautions[currentLang].includes('صيام')&&!p.precautions[currentLang].toLowerCase().includes('fasting'))); document.getElementById('app-content').innerHTML = `<div class="max-w-5xl mx-auto px-5 py-12"><div class="text-center"><i data-lucide="clipboard-list" class="w-12 h-12 text-primary mx-auto mb-4"></i><h1 class="text-3xl font-bold">${t().preparation}</h1></div><div class="flex justify-center gap-2 mt-6 mb-8"><button onclick="switchTab('fasting')" id="fasting-tab" class="tab-btn active-fasting">${t().fastingRequired}</button><button onclick="switchTab('nonfasting')" id="nonfasting-tab" class="tab-btn">${t().noFasting}</button></div><div id="fasting-panel" class="tab-content active space-y-3">${fasting.map(p=>`<div class="bg-white rounded-xl p-4 border-l-4 border-amber-400 shadow-sm"><h3 class="font-semibold">${p.name[currentLang]}</h3><p class="text-amber-700 text-sm">⚠️ ${p.precautions[currentLang]}</p></div>`).join('')}</div><div id="nonfasting-panel" class="tab-content space-y-3">${non.map(p=>`<div class="bg-white rounded-xl p-4 border-l-4 border-green-400"><h3 class="font-semibold">${p.name[currentLang]}</h3><p class="text-green-700 text-sm">✔️ ${p.precautions[currentLang]}</p></div>`).join('')}</div></div>`; lucide.createIcons(); }
        function switchTab(tab){ document.getElementById('fasting-tab').className = tab==='fasting'?'tab-btn active-fasting':'tab-btn'; document.getElementById('nonfasting-tab').className = tab==='nonfasting'?'tab-btn active-nonfasting':'tab-btn'; document.getElementById('fasting-panel').className = tab==='fasting'?'tab-content active space-y-3':'tab-content space-y-3'; document.getElementById('nonfasting-panel').className = tab==='nonfasting'?'tab-content active space-y-3':'tab-content space-y-3'; }
        document.addEventListener('DOMContentLoaded', ()=>{ renderNav(); showView('home'); lucide.createIcons(); });
    </script>
</body>
</html>
