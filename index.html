        { name: "Ferritin / Iron", description: { en: "Measures the amount of iron stored in your body and the iron levels in your blood.", ar: "يقيس كمية الحديد المخزنة في جسمك ومستويات الحديد في دمك." } },
        { name: "Vitamin D", description: { en: "Essential for bone health and immune function.", ar: "ضروري لصحة العظام ووظيفة المناعة." } },
        { name: "Vitamin B12", description: { en: "Important for nerve function and the production of red blood cells.", ar: "مهم لوظيفة الأعصاب وإنتاج خلايا الدم الحمراء." } },
        { name: "Zinc / Magnesium / Calcium", description: { en: "Essential minerals for various bodily functions including immunity, muscle health, and bone strength.", ar: "معادن أساسية لوظائف الجسم المختلفة بما في ذلك المناعة وصحة العضلات وقوة العظام." } },
        { name: "Urea Breath Test (UBT)", description: { en: "A non-invasive test used to detect the presence of Helicobacter pylori (H. pylori) bacteria in the stomach.", ar: "اختبار غير جراحي يستخدم للكشف عن وجود بكتيريا الملوية البوابية (جرثومة المعدة) في المعدة." } }
      ];

      // --- LOGIC ---
      let currentLang = 'en';
      const translations = {
        en: {
          logo: "DMSCO Health", home: "Home", packages: "Packages", glossary: "Glossary", prep: "Preparation",
          heroTitle: "Check and Be Reassured", heroSub: "Comprehensive health screening packages tailored for your needs.",
          searchPlaceholder: "Search for packages or tests (e.g. Vitamin D)...", filters: "Smart Search",
          category: "Category", priceRange: "Price Range", testCount: "Test Count", all: "All",
          men: "Men", women: "Women", children: "Children", skin: "Skin/Beauty", weight: "Weight Loss",
          chronic: "Chronic Disease", vitamins: "Vitamins", sar: "SAR", tests: "Tests", details: "View Details",
          fastingReq: "Fasting Required", noFasting: "No Fasting", targetGroup: "Target Group",
          precautions: "Precautions", testList: "Included Tests", glossaryTitle: "Test Glossary",
          glossarySub: "Understand what your tests measure.", prepTitle: "Preparation Guide",
          prepSub: "Everything you need to know before your visit.", noResults: "No packages found matching your criteria.",
          basic: "Basic (1-5 tests)", standard: "Standard (6-20 tests)", comprehensive: "Comprehensive (21+ tests)"
        },
        ar: {
          logo: "ديمسكو للصحة", home: "الرئيسية", packages: "الباقات", glossary: "قاموس التحاليل", prep: "دليل التحضير",
          heroTitle: "افحص وتطمن", heroSub: "باقات فحص صحي شاملة مصممة خصيصاً لاحتياجاتك.",
          searchPlaceholder: "ابحث عن الباقات أو التحاليل (مثلاً: فيتامين د)...", filters: "البحث الذكي",
          category: "الفئة", priceRange: "نطاق السعر", testCount: "عدد التحاليل", all: "الكل",
          men: "الرجال", women: "النساء", children: "الأطفال", skin: "البشرة والجمال", weight: "إنقاص الوزن",
          chronic: "الأمراض المزمنة", vitamins: "الفيتامينات", sar: "ريال", tests: "تحليل", details: "عرض التفاصيل",
          fastingReq: "يتطلب صيام", noFasting: "لا يتطلب صيام", targetGroup: "الفئة المستهدفة",
          precautions: "الاحتياطات", testList: "التحاليل المشمولة", glossaryTitle: "قاموس التحاليل",
          glossarySub: "افهم ماذا تقيس تحاليلك.", prepTitle: "دليل التحضير",
          prepSub: "كل ما تحتاج معرفته قبل زيارتك.", noResults: "لم يتم العثور على باقات تطابق معاييرك.",
          basic: "أساسي (1-5 تحاليل)", standard: "قياسي (6-20 تحليل)", comprehensive: "شامل (21+ تحليل)"
        }
      };

      function init() { renderHome(); setupEventListeners(); updateUIStrings(); }
      function setupEventListeners() {
        document.getElementById('lang-btn').addEventListener('click', toggleLanguage);
        document.getElementById('nav-home').addEventListener('click', (e) => { e.preventDefault(); renderHome(); });
        document.getElementById('nav-packages').addEventListener('click', (e) => { e.preventDefault(); renderPackages(); });
        document.getElementById('nav-glossary').addEventListener('click', (e) => { e.preventDefault(); renderGlossary(); });
        document.getElementById('nav-prep').addEventListener('click', (e) => { e.preventDefault(); renderPreparation(); });
      }
      function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        const html = document.getElementById('html-root');
        html.setAttribute('lang', currentLang);
        html.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
        document.getElementById('lang-btn').textContent = currentLang === 'en' ? 'العربية' : 'English';
        updateUIStrings();
        const currentView = document.querySelector('[data-view]');
        if (currentView) {
          const viewName = currentView.getAttribute('data-view');
          if (viewName === 'home') renderHome();
          else if (viewName === 'packages') renderPackages();
          else if (viewName === 'glossary') renderGlossary();
          else if (viewName === 'prep') renderPreparation();
        }
      }
      function updateUIStrings() {
        const t = translations[currentLang];
        document.getElementById('nav-logo').textContent = t.logo;
        document.getElementById('nav-home').textContent = t.home;
        document.getElementById('nav-packages').textContent = t.packages;
        document.getElementById('nav-glossary').textContent = t.glossary;
        document.getElementById('nav-prep').textContent = t.prep;
        document.getElementById('footer-text').innerHTML = `&copy; 2026 ${t.logo}. All rights reserved.`;
      }
      function renderHome() {
        const t = translations[currentLang];
        const content = document.getElementById('app-content');
        content.innerHTML = `
          <div data-view="home">
            <section class="hero-section text-center">
              <div class="container">
                <h1 class="display-4 fw-bold mb-3">${t.heroTitle}</h1>
                <p class="lead mb-4">${t.heroSub}</p>
                <div class="row justify-content-center">
                  <div class="col-md-8">
                    <div class="input-group input-group-lg shadow-sm">
                      <input type="text" id="main-search" class="form-control border-0" placeholder="${t.searchPlaceholder}">
                      <button class="btn btn-gold px-4" id="hero-search-btn">${currentLang === 'en' ? 'Search' : 'بحث'}</button>
                    </div>
                  </div>
                </div>
              </div>
            </section>
            <div class="container">
              <div class="row g-4 mb-5">
                <div class="col-md-4">
                  <div class="card card-package p-4 text-center border-0 shadow-sm" style="cursor:pointer" onclick="window.location.hash='#packages'; document.getElementById('nav-packages').click();">
                    <i data-lucide="users" class="mx-auto mb-3 text-primary" style="width:48px; height:48px"></i>
                    <h3>${t.men}</h3><p class="text-muted">Gold & Silver Packages</p>
                  </div>
                </div>
                <div class="col-md-4">
                  <div class="card card-package p-4 text-center border-0 shadow-sm" style="cursor:pointer" onclick="window.location.hash='#packages'; document.getElementById('nav-packages').click();">
                    <i data-lucide="user-round" class="mx-auto mb-3 text-danger" style="width:48px; height:48px"></i>
                    <h3>${t.women}</h3><p class="text-muted">Gold & Silver Packages</p>
                  </div>
                </div>
                <div class="col-md-4">
                  <div class="card card-package p-4 text-center border-0 shadow-sm" style="cursor:pointer" onclick="window.location.hash='#packages'; document.getElementById('nav-packages').click();">
                    <i data-lucide="baby" class="mx-auto mb-3 text-success" style="width:48px; height:48px"></i>
                    <h3>${t.children}</h3><p class="text-muted">Growth & Immunity</p>
                  </div>
                </div>
              </div>
              <h2 class="text-center mb-4">${currentLang === 'en' ? 'Featured Packages' : 'باقات مميزة'}</h2>
              <div class="row g-4" id="featured-packages"></div>
            </div>
          </div>
        `;
        lucide.createIcons();
        const featured = packages.slice(0, 3);
        const featuredContainer = document.getElementById('featured-packages');
        featured.forEach(pkg => { featuredContainer.appendChild(createPackageCard(pkg)); });
        document.getElementById('hero-search-btn').addEventListener('click', () => {
          const query = document.getElementById('main-search').value;
          renderPackages(query);
        });
      }
      function createPackageCard(pkg) {
        const t = translations[currentLang];
        const col = document.createElement('div');
        col.className = 'col-md-4';
        col.innerHTML = `
          <div class="card card-package shadow-sm h-100">
            <div class="card-body d-flex flex-column">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <span class="badge bg-primary-subtle text-primary">${t[pkg.category.toLowerCase().replace(' ', '')] || pkg.category}</span>
                <span class="price-tag">${pkg.price} ${t.sar}</span>
              </div>
              <h5 class="card-title fw-bold mb-3">${pkg.name[currentLang]}</h5>
              <p class="text-muted small mb-3"><i data-lucide="microscope" class="me-1" style="width:16px; height:16px"></i> ${pkg.testCount} ${t.tests}</p>
              <div class="mt-auto"><button class="btn btn-gold w-100" onclick="showPackageDetails(${pkg.id})">${t.details}</button></div>
            </div>
          </div>
        `;
        return col;
      }
      window.showTestDetails = (testName) => {
        const t = translations[currentLang];
        const normalizedName = testName.split('(')[0].trim().toLowerCase();
        const entry = glossary.find(item => item.name.toLowerCase().includes(normalizedName) || normalizedName.includes(item.name.toLowerCase()));
        if (entry) {
          Swal.fire({ title: entry.name, text: entry.description[currentLang], icon: 'info', confirmButtonText: currentLang === 'en' ? 'Close' : 'إغلاق', confirmButtonColor: '#004a99' });
        } else {
          Swal.fire({ title: testName, text: currentLang === 'en' ? 'Detailed information for this test will be added soon.' : 'سيتم إضافة معلومات مفصلة لهذا الفحص قريباً.', icon: 'question', confirmButtonText: currentLang === 'en' ? 'Close' : 'إغلاق', confirmButtonColor: '#004a99' });
        }
      };
      window.showPackageDetails = (id) => {
        const pkg = packages.find(p => p.id === id);
        const t = translations[currentLang];
        let testsHtml = pkg.tests.map(test => `<span class="test-badge" style="cursor:pointer" onclick="showTestDetails('${test.replace(/'/g, "\\'")}')" title="${currentLang === 'en' ? 'Click for details' : 'انقر للتفاصيل'}">${test}</span>`).join('');
        Swal.fire({
          title: pkg.name[currentLang],
          html: `
            <div class="text-start ${currentLang === 'ar' ? 'text-end' : ''}">
              <div class="mb-3"><h6 class="fw-bold text-primary"><i data-lucide="info" class="me-2"></i>${t.targetGroup}</h6><p class="small text-muted">${pkg.targetGroup[currentLang]}</p></div>
              <div class="mb-3"><h6 class="fw-bold text-danger"><i data-lucide="alert-circle" class="me-2"></i>${t.precautions}</h6><p class="small text-muted">${pkg.precautions[currentLang]}</p></div>
              <div class="mb-3"><h6 class="fw-bold text-success"><i data-lucide="list" class="me-2"></i>${t.testList} (${pkg.testCount})</h6><p class="small text-muted mb-2">${currentLang === 'en' ? 'Tip: Click on a test name to learn more about it.' : 'نصيحة: انقر على اسم الفحص لمعرفة المزيد عنه.'}</p><div class="d-flex flex-wrap">${testsHtml}</div></div>
            </div>
          `,
          width: '800px', confirmButtonText: currentLang === 'en' ? 'Close' : 'إغلاق', confirmButtonColor: '#004a99', showCloseButton: true, didOpen: () => { lucide.createIcons(); }
        });
      };
      function renderPackages(searchQuery = '') {
        const t = translations[currentLang];
        const content = document.getElementById('app-content');
        content.innerHTML = `
          <div data-view="packages" class="container py-5">
            <div class="row">
              <div class="col-lg-3 mb-4">
                <div class="sidebar">
                  <h5 class="fw-bold mb-4"><i data-lucide="search" class="me-2"></i>${t.filters}</h5>
                  <div class="mb-4"><label class="form-label fw-semibold">${t.category}</label><select class="form-select" id="filter-category"><option value="all">${t.all}</option><option value="Men">${t.men}</option><option value="Women">${t.women}</option><option value="Children">${t.children}</option><option value="Skin/Beauty">${t.skin}</option><option value="Weight Loss">${t.weight}</option><option value="Chronic Disease">${t.chronic}</option><option value="Vitamins">${t.vitamins}</option></select></div>
                  <div class="mb-4"><label class="form-label fw-semibold">${t.priceRange}</label><div class="d-flex align-items-center gap-2"><input type="number" class="form-control form-control-sm" id="filter-price-min" placeholder="Min" value="0"><span>-</span><input type="number" class="form-control form-control-sm" id="filter-price-max" placeholder="Max" value="1000"></div></div>
                  <div class="mb-4"><label class="form-label fw-semibold">${t.testCount}</label><div class="form-check"><input class="form-check-input" type="radio" name="testCount" value="all" id="tc-all" checked><label class="form-check-label" for="tc-all">${t.all}</label></div><div class="form-check"><input class="form-check-input" type="radio" name="testCount" value="basic" id="tc-basic"><label class="form-check-label" for="tc-basic">${t.basic}</label></div><div class="form-check"><input class="form-check-input" type="radio" name="testCount" value="standard" id="tc-standard"><label class="form-check-label" for="tc-standard">${t.standard}</label></div><div class="form-check"><input class="form-check-input" type="radio" name="testCount" value="comprehensive" id="tc-comprehensive"><label class="form-check-label" for="tc-comprehensive">${t.comprehensive}</label></div></div>
                  <div class="mb-4"><label class="form-label fw-semibold">${currentLang === 'en' ? 'Search Tests' : 'بحث في التحاليل'}</label><input type="text" class="form-control" id="filter-test-search" placeholder="e.g. Ferritin"></div>
                  <button class="btn btn-primary w-100" id="apply-filters">${currentLang === 'en' ? 'Apply Filters' : 'تطبيق الفلاتر'}</button>
                </div>
              </div>
              <div class="col-lg-9">
                <div class="input-group mb-4 shadow-sm"><input type="text" id="package-search" class="form-control" placeholder="${t.searchPlaceholder}" value="${searchQuery}"><button class="btn btn-gold px-4" id="search-btn"><i data-lucide="search"></i></button></div>
                <div class="row g-4" id="packages-list"></div><div id="no-results" class="text-center py-5 d-none"><i data-lucide="search-x" class="text-muted mb-3" style="width:64px; height:64px"></i><p class="lead text-muted">${t.noResults}</p></div>
              </div>
            </div>
          </div>
        `;
        lucide.createIcons(); applyFilters();
        document.getElementById('apply-filters').addEventListener('click', applyFilters);
        document.getElementById('search-btn').addEventListener('click', applyFilters);
        document.getElementById('package-search').addEventListener('keyup', (e) => { if(e.key === 'Enter') applyFilters(); });
      }
      function applyFilters() {
        const category = document.getElementById('filter-category').value;
        const minPrice = parseInt(document.getElementById('filter-price-min').value) || 0;
        const maxPrice = parseInt(document.getElementById('filter-price-max').value) || 1000;
        const testCountRange = document.querySelector('input[name="testCount"]:checked').value;
        const testSearch = document.getElementById('filter-test-search').value.toLowerCase();
        const nameSearch = document.getElementById('package-search').value.toLowerCase();
        const filtered = packages.filter(pkg => {
          const matchesCategory = category === 'all' || pkg.category === category;
          const matchesPrice = pkg.price >= minPrice && pkg.price <= maxPrice;
          let matchesTestCount = true;
          if (testCountRange === 'basic') matchesTestCount = pkg.testCount <= 5;
          else if (testCountRange === 'standard') matchesTestCount = pkg.testCount > 5 && pkg.testCount <= 20;
          else if (testCountRange === 'comprehensive') matchesTestCount = pkg.testCount > 20;
          const matchesTestSearch = testSearch === '' || pkg.tests.some(t => t.toLowerCase().includes(testSearch));
          const matchesNameSearch = nameSearch === '' || pkg.name[currentLang].toLowerCase().includes(nameSearch);
          return matchesCategory && matchesPrice && matchesTestCount && matchesTestSearch && matchesNameSearch;
        });
        const list = document.getElementById('packages-list');
        const noResults = document.getElementById('no-results');
        list.innerHTML = '';
        if (filtered.length === 0) { noResults.classList.remove('d-none'); } else { noResults.classList.add('d-none'); filtered.forEach(pkg => { list.appendChild(createPackageCard(pkg)); }); }
        lucide.createIcons();
      }
      function renderGlossary() {
        const t = translations[currentLang];
        const content = document.getElementById('app-content');
        content.innerHTML = `
          <div data-view="glossary" class="container py-5">
            <div class="text-center mb-5"><h1 class="fw-bold">${t.glossaryTitle}</h1><p class="text-muted">${t.glossarySub}</p></div>
            <div class="row g-4">${glossary.map(item => `<div class="col-md-6"><div class="card h-100 border-0 shadow-sm p-4"><h5 class="fw-bold text-primary mb-3">${item.name}</h5><p class="mb-0 text-muted">${item.description[currentLang]}</p></div></div>`).join('')}</div>
          </div>
        `;
      }
      function renderPreparation() {
        const t = translations[currentLang];
        const content = document.getElementById('app-content');
        const fasting = packages.filter(p => p.precautions[currentLang].includes('صيام') || p.precautions[currentLang].toLowerCase().includes('fasting'));
        const nonFasting = packages.filter(p => !fasting.includes(p));
        content.innerHTML = `
          <div data-view="prep" class="container py-5">
            <div class="text-center mb-5"><h1 class="fw-bold">${t.prepTitle}</h1><p class="text-muted">${t.prepSub}</p></div>
            <div class="row">
              <div class="col-md-6 mb-4"><div class="card h-100 border-0 shadow-sm overflow-hidden"><div class="bg-primary text-white p-3"><h5 class="mb-0"><i data-lucide="clock" class="me-2"></i>${t.fastingReq}</h5></div><div class="p-4"><ul class="list-group list-group-flush">${fasting.map(p => `<li class="list-group-item border-0 px-0"><div class="fw-bold">${p.name[currentLang]}</div><div class="small text-danger">${p.precautions[currentLang]}</div></li>`).join('')}</ul></div></div></div>
              <div class="col-md-6 mb-4"><div class="card h-100 border-0 shadow-sm overflow-hidden"><div class="bg-success text-white p-3"><h5 class="mb-0"><i data-lucide="check-circle" class="me-2"></i>${t.noFasting}</h5></div><div class="p-4"><ul class="list-group list-group-flush">${nonFasting.map(p => `<li class="list-group-item border-0 px-0"><div class="fw-bold">${p.name[currentLang]}</div><div class="small text-muted">${p.precautions[currentLang]}</div></li>`).join('')}</ul></div></div></div>
            </div>
            <div class="alert alert-info mt-4" role="alert"><h5 class="alert-heading fw-bold"><i data-lucide="info" class="me-2"></i>${currentLang === 'en' ? 'General Instructions' : 'تعليمات عامة'}</h5><ul class="mb-0"><li>${currentLang === 'en' ? 'Drink plenty of water unless instructed otherwise.' : 'اشرب الكثير من الماء ما لم يُطلب منك خلاف ذلك.'}</li><li>${currentLang === 'en' ? 'Continue taking your regular medications unless they affect the test results.' : 'استمر في تناول أدويتك المعتادة ما لم تكن تؤثر على نتائج الفحص.'}</li><li>${currentLang === 'en' ? 'For H. Pylori Breath Test: 4 weeks antibiotic-free is mandatory.' : 'لفحص جرثومة المعدة بالتنفس: يجب التوقف عن المضادات الحيوية لمدة 4 أسابيع.'}</li></ul></div>
          </div>
        `;
        lucide.createIcons();
      }
      document.addEventListener('DOMContentLoaded', init);
    </script>
  </body>
</html>
