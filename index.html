        :root {

            --muted: hsl(40, 14%, 94%);
            --muted-foreground: hsl(165, 4%, 45%);
            --card: hsl(0, 0%, 100%);
            --border: hsl(40, 10%, 85%);
        }
        
        body { font-family: 'Outfit', sans-serif; background-color: var(--background); color: var(--foreground); margin: 0; }
        [dir="rtl"] body { font-family: 'Cairo', sans-serif; }
        [dir="rtl"] { text-align: right; }
        
        /* Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        
        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .stagger-1 { animation-delay: 0.1s; } .stagger-2 { animation-delay: 0.2s; } .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; } .stagger-5 { animation-delay: 0.5s; } .stagger-6 { animation-delay: 0.6s; }
        
        /* Card hover */
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(44, 85, 69, 0.15); }
        
        /* Barcode */
        .barcode-container { background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%); border-bottom: 1px dashed var(--border); }
        .barcode-container:hover { background: linear-gradient(180deg, #f0f9f4 0%, #ffffff 100%); }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--muted); }
        ::-webkit-scrollbar-thumb { background: rgba(44, 85, 69, 0.3); border-radius: 4px; }
        
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: white; border-radius: 16px; max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto; transform: scale(0.9); transition: transform 0.3s; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        
        /* Accordion */
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-item.open .accordion-content { max-height: 500px; }
        .accordion-item.open .accordion-icon { transform: rotate(180deg); }
        
        /* Tabs */
        .tab-btn { padding: 12px 24px; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
        .tab-btn.active-fasting { background: #fef3c7; color: #92400e; }
        .tab-btn.active-nonfasting { background: #d1fae5; color: #065f46; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Buttons */
        .btn-primary { background: var(--primary); color: var(--primary-foreground); padding: 10px 20px; border-radius: 8px; font-weight: 500; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        .btn-outline:hover { background: var(--muted); }
        .btn-ghost { background: transparent; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-ghost:hover { background: var(--muted); }
        .btn-ghost.active { background: rgba(44, 85, 69, 0.1); color: var(--primary); }
        
        /* Badge */
        .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .badge-outline { border: 1px solid var(--border); background: white; }
        .badge-amber { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .badge-green { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        
        /* Form elements */
        .input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: white; font-size: 14px; transition: all 0.2s; }
        .input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(44, 85, 69, 0.1); }
        .select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: white; font-size: 14px; cursor: pointer; }

                const matchCategory = filters.category === 'all' || pkg.category === filters.category;
                const isFasting = pkg.precautions[currentLang].toLowerCase().includes('fasting') || pkg.precautions[currentLang].includes('صيام');
                const matchPrep = filters.prep === 'all' || (filters.prep === 'fasting' ? isFasting : !isFasting);
                const matchComplexity = filters.complexity === 'all' || (filters.complexity === 'basic' ? pkg.testCount < 10 : pkg.testCount >= 10);
                const minPrice = parseInt(filters.minPrice) || 0;
                const maxPrice = parseInt(filters.maxPrice) || 9999;
                const matchPrice = pkg.price >= minPrice && pkg.price <= maxPrice;
                const matchSearch = filters.search === '' || pkg.name[currentLang].toLowerCase().includes(filters.search.toLowerCase()) || pkg.code.includes(filters.search);
                return matchCategory && matchPrep && matchComplexity && matchPrice && matchSearch;
            });

            document.getElementById('package-count').textContent = `${filtered.length} ${t().packages}`;
            
            if (filtered.length > 0) {
                document.getElementById('packages-grid').innerHTML = filtered.map((pkg, idx) => renderPackageCard(pkg, idx)).join('');
            } else {
                document.getElementById('packages-grid').innerHTML = `<div class="col-span-full text-center py-16"><i data-lucide="flask-conical" class="w-16 h-16 mx-auto text-muted-foreground/50 mb-4"></i><p class="text-muted-foreground">${t().noResults}</p></div>`;
            }
            lucide.createIcons();
        }

        // Show package detail
        function showPackageDetail(id) {
            const pkg = packages.find(p => p.id === id);
            const config = categoryConfig[pkg.category] || { icon: 'flask-conical', catClass: 'cat-men' };
            const isFasting = pkg.precautions[currentLang].toLowerCase().includes('fasting') || pkg.precautions[currentLang].includes('صيام');

            document.getElementById('modal-content').innerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div class="p-2 rounded-xl ${config.catClass}"><i data-lucide="${config.icon}" class="w-6 h-6"></i></div>
                        <h2 class="text-xl font-semibold">${pkg.name[currentLang]}</h2>
                    </div>
                    <button onclick="closeModal()" class="btn-ghost"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="bg-gray-50 p-6 rounded-xl text-center cursor-pointer hover:shadow-md transition-shadow mb-4" onclick="showEnlargedBarcode('${pkg.code}', '${pkg.name[currentLang].replace(/'/g, "\\'")}')">
                    <p class="text-xs text-muted-foreground mb-3">${t().clickToEnlarge}</p>
                    <img src="https://barcodeapi.org/api/128/${pkg.code}" alt="Barcode" class="h-12 mx-auto">
                    <p class="font-mono text-lg mt-3 tracking-widest text-primary font-medium">${pkg.code}</p>
                    <p class="text-sm text-muted-foreground mt-2">${t().scanAtLab}</p>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="p-4 bg-muted/50 rounded-xl">
                        <p class="text-sm text-muted-foreground mb-1">${t().targetGroup}</p>
                        <p class="font-medium">${pkg.targetGroup[currentLang]}</p>
                    </div>
                    <div class="p-4 rounded-xl ${isFasting ? 'bg-amber-50' : 'bg-green-50'}">
                        <p class="text-sm text-muted-foreground mb-1">${t().precautions}</p>
                        <p class="font-medium ${isFasting ? 'text-amber-700' : 'text-green-700'}">${pkg.precautions[currentLang]}</p>
                    </div>
                </div>
                <div class="mb-4">
                    <h4 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="flask-conical" class="w-4 h-4"></i>${t().includedTests} (${pkg.testCount})</h4>
                    <div class="flex flex-wrap gap-2">${pkg.tests.map(test => `<span class="badge badge-outline bg-primary/5">${test}</span>`).join('')}</div>
                </div>
                <div class="p-4 bg-primary/5 rounded-xl flex items-center justify-between">
                    <span class="text-muted-foreground">${t().packages}</span>
                    <span class="text-3xl font-bold text-primary">${pkg.price} <span class="text-base font-normal">${t().sar}</span></span>
                </div>
            `;
            document.getElementById('package-modal').classList.add('active');
            lucide.createIcons();
        }

        // Close modal
        function closeModal(event) {
            if (!event || event.target === event.currentTarget) {
                document.getElementById('package-modal').classList.remove('active');
            }
        }

        // Show enlarged barcode
        function showEnlargedBarcode(code, name) {
            document.getElementById('barcode-content').innerHTML = `
                <button onclick="closeBarcodeModal()" class="absolute top-4 ${currentLang === 'ar' ? 'left-4' : 'right-4'} btn-ghost"><i data-lucide="x" class="w-5 h-5"></i></button>
                <h3 class="text-lg font-semibold mb-2">${name}</h3>
                <p class="text-sm text-muted-foreground mb-4">${t().scanAtLab}</p>
                <img src="https://barcodeapi.org/api/128/${code}" alt="Barcode" class="w-full max-w-sm mx-auto">
                <p class="font-mono text-3xl mt-6 tracking-widest text-primary font-bold">${code}</p>
            `;
            document.getElementById('barcode-modal').classList.add('active');
            lucide.createIcons();
        }

        // Close barcode modal
        function closeBarcodeModal(event) {
            if (!event || event.target === event.currentTarget) {
                document.getElementById('barcode-modal').classList.remove('active');
            }
        }

        // Render Glossary
        function renderGlossary() {
            document.getElementById('app-content').innerHTML = `
                <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">
                    <div class="text-center mb-12">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 mb-4">
                            <i data-lucide="book-open" class="w-8 h-8 text-primary"></i>
                        </div>
                        <h1 class="text-2xl sm:text-3xl lg:text-4xl font-medium tracking-tight">${t().glossaryTitle}</h1>
                        <p class="text-muted-foreground mt-2">${t().glossarySubtitle}</p>
                    </div>
                    <div class="space-y-3">
                        ${glossary.map((item, idx) => `
                            <div class="accordion-item bg-white rounded-xl border border-gray-200/50 px-6 opacity-0 animate-fade-in-up" style="animation-delay: ${idx * 0.05}s; animation-fill-mode: forwards;">
                                <button onclick="toggleAccordion(this)" class="w-full py-4 flex items-center justify-between text-start">
                                    <div class="flex items-center gap-3">
                                        <div class="p-2 bg-primary/10 rounded-lg"><i data-lucide="flask-conical" class="w-4 h-4 text-primary"></i></div>
                                        <span class="font-semibold">${item.name}</span>
                                    </div>
                                    <i data-lucide="chevron-down" class="w-5 h-5 text-muted-foreground accordion-icon transition-transform"></i>
                                </button>
                                <div class="accordion-content">
                                    <p class="text-muted-foreground pb-4 ${currentLang === 'ar' ? 'pr-11' : 'pl-11'}">${item.description[currentLang]}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // Toggle accordion
        function toggleAccordion(btn) {
            btn.parentElement.classList.toggle('open');
        }

        // Render Preparation
        function renderPreparation() {
            const noFastIds = [10, 11, 18, 19, 20];
            const fastingPkgs = packages.filter(p => !noFastIds.includes(p.id) && (p.precautions[currentLang].toLowerCase().includes('fasting') || p.precautions[currentLang].includes('صيام')));
            const nonFastingPkgs = packages.filter(p => noFastIds.includes(p.id) || (!p.precautions[currentLang].toLowerCase().includes('fasting') && !p.precautions[currentLang].includes('صيام')));

            document.getElementById('app-content').innerHTML = `
                <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">
                    <div class="text-center mb-12">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 mb-4">
                            <i data-lucide="clipboard-list" class="w-8 h-8 text-primary"></i>
                        </div>
                        <h1 class="text-2xl sm:text-3xl lg:text-4xl font-medium tracking-tight">${t().prepTitle}</h1>
                        <p class="text-muted-foreground mt-2">${t().prepSubtitle}</p>
                    </div>
                    <div class="flex gap-2 mb-8 bg-muted/50 p-1 rounded-xl">
                        <button onclick="switchPrepTab('fasting')" id="tab-fasting" class="tab-btn flex-1 active-fasting">${t().fastingPackages}</button>
                        <button onclick="switchPrepTab('nonfasting')" id="tab-nonfasting" class="tab-btn flex-1">${t().nonFastingPackages}</button>
                    </div>
                    <div id="prep-fasting" class="tab-content active space-y-3">
                        ${fastingPkgs.map((pkg, idx) => `
                            <div class="p-5 bg-white rounded-xl border border-amber-200/50 opacity-0 animate-fade-in-up" style="animation-delay: ${idx * 0.05}s; animation-fill-mode: forwards;">
                                <h3 class="font-semibold mb-2">${pkg.name[currentLang]}</h3>
                                <p class="text-sm text-amber-700 flex items-center gap-2"><i data-lucide="activity" class="w-4 h-4"></i>${pkg.precautions[currentLang]}</p>
                            </div>
                        `).join('')}
                    </div>
                    <div id="prep-nonfasting" class="tab-content space-y-3">
                        ${nonFastingPkgs.map((pkg, idx) => `
                            <div class="p-5 bg-white rounded-xl border border-green-200/50 opacity-0 animate-fade-in-up" style="animation-delay: ${idx * 0.05}s; animation-fill-mode: forwards;">
                                <h3 class="font-semibold mb-2">${pkg.name[currentLang]}</h3>
                                <p class="text-sm text-green-700 flex items-center gap-2"><i data-lucide="activity" class="w-4 h-4"></i>${pkg.precautions[currentLang]}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // Switch prep tab
        function switchPrepTab(tab) {
            document.getElementById('tab-fasting').className = tab === 'fasting' ? 'tab-btn flex-1 active-fasting' : 'tab-btn flex-1';
            document.getElementById('tab-nonfasting').className = tab === 'nonfasting' ? 'tab-btn flex-1 active-nonfasting' : 'tab-btn flex-1';
            document.getElementById('prep-fasting').className = tab === 'fasting' ? 'tab-content active space-y-3' : 'tab-content space-y-3';
            document.getElementById('prep-nonfasting').className = tab === 'nonfasting' ? 'tab-content active space-y-3' : 'tab-content space-y-3';
            lucide.createIcons();
        }

        // Initialize on DOM load
        document.addEventListener('DOMContentLoaded', init);
    </script>
